<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zig Raytracer</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a1a;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      canvas {
        border: 1px solid #444;
        max-width: 90vw;
      }
      .controls {
        margin: 1rem;
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      button {
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      #status {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <h1>Zig Raytracer</h1>
    <div id="display">
      <img
        id="prerendered"
        src="scene.png"
        alt="Pre-rendered raytracer scene"
        width="800"
        height="600"
      />
      <canvas id="canvas" width="800" height="600" hidden></canvas>
    </div>
    <div class="controls">
      <label>
        Samples: <input type="range" id="samples" min="1" max="200" value="20"/>
      </label>
      <span id="samples-value">20</span>
      <button id="render-btn">Run in Browser</button>
    </div>
    <div id="status">
      Pre-rendered image. Click "Run in Browser" to render live with WASM.
    </div>
    <script src="main.js"></script>
  </body>
</html>
