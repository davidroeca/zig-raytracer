<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zig Raytracer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #1a1a1a;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      canvas {
        border: 1px solid #444;
      }
      img#prerendered,
      .canvas {
        max-width: 90vw;
      }
      .controls {
        margin: 1rem;
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      button {
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      #status {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: #aaa;
      }
      .links {
        margin-top: 1.5rem;
        display: flex;
        gap: 1.5rem;
        font-size: 1.5rem;
      }
      .links a {
        color: #aaa;
        text-decoration: none;
        transition: color 0.2s;
      }
      .links a:hover {
        color: #eee;
      }
      .link-label {
        font-size: 0.75rem;
        vertical-align: middle;
        margin-left: 0.25rem;
      }
    </style>
  </head>
  <body>
    <h1>Zig Raytracer</h1>
    <div id="display">
      <img
        id="prerendered"
        src="scene.png"
        alt="Pre-rendered raytracer scene"
        width="800"
        height="auto"
      />
      <canvas id="canvas" width="800" height="600" hidden></canvas>
    </div>
    <div class="controls">
      <label>
        Samples:&nbsp;
        <input type="range" id="samples" min="1" max="200" value="20" />
      </label>
      <span id="samples-value"></span>
      <button id="render-btn">Run in Browser</button>
    </div>
    <div id="status">
      Pre-rendered image. Click "Run in Browser" to render live with WASM.
    </div>
    <div class="links">
      <a href="https://davidroeca.com" title="Home">
        <i class="fa-solid fa-house" aria-hidden="true"></i>
        <span class="link-label">davidroeca.com</span>
      </a>
      <a href="https://github.com/davidroeca/zig-raytracer" title="GitHub">
        <i class="fa-brands fa-github" aria-hidden="true"></i>
        <span class="link-label">GitHub</span>
      </a>
    </div>
    <script src="main.js"></script>
  </body>
</html>
